name: SonarQube Scan

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to scan (defaults to the dispatching ref)"
        required: false
        type: string

concurrency:
  group: sonarqube-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    # Skip PRs from forks: repository secrets are unavailable to fork-triggered
    # pull_request runs, which would cause the scan to fail without SONAR_TOKEN
    # and SONAR_HOST_URL. Same-repo PRs and pushes proceed normally; maintainers
    # can manually scan fork commits via workflow_dispatch with the `ref` input.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

      - name: Job summary
        if: always()
        run: |
          {
            echo "## SonarQube Scan"
            echo ""
            echo "- Host: ${{ secrets.SONAR_HOST_URL }}"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
